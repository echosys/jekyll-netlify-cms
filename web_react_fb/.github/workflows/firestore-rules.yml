name: Firestore Rules Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  rules-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Install dependencies
        run: npm ci

      - name: Run Firestore emulator and tests
        env:
          # Use demo project id to avoid accidental non-emulated calls
          GCLOUD_PROJECT: demo-project
        run: |
          npx firebase --version
          # Run emulators and execute the test runner; the emulators will be discovered by the test helper
          npx firebase emulators:exec "node test/run-firestore-tests.js" --project demo-project

